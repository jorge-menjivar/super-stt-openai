# SPDX-License-Identifier: GPL-3.0-only
#:schema https://jorge-menjivar.github.io/super-stt/backend.schema.json
# OpenAI backend configuration. See docs/protocol/backend/config.md.

[backend]
    source = "github.com/jorge-menjivar/super-stt-openai"
    name = "OpenAI"
    version = "0.1.0"
    kind = "wasm"
    entrypoint = "openai.wasm"
    contract = "v1"
    license = "GPL-3.0-only"

[assets]
    # Filename of the wasm component attached to the GitHub release. The indexer
    # hashes these bytes into the registry's manifest pin; must match `entrypoint`.
    wasm = "openai.wasm"

[network]
    allowed_hosts = ["api.openai.com"]

[[secrets]]
    name = "openai_api_key"
    label = "OpenAI API key"
    description = "Used to authenticate requests to api.openai.com."
    required = true

[[options]]
    name = "base_url"
    label = "API base URL"
    description = "Override the API base URL, e.g. for a gateway."
    type = "string"
    default = "https://api.openai.com"

[[models]]
    name = "whisper-1"
    provider = "openai"
    multilingual = true
    primary_language = "en"
    supported_languages = ["en"]
    supported_devices = ["none"]

[[models]]
    name = "gpt-4o-transcribe"
    provider = "openai"
    multilingual = true
    primary_language = "en"
    supported_languages = ["en"]
    supported_devices = ["none"]

[[models]]
    name = "gpt-4o-mini-transcribe"
    provider = "openai"
    multilingual = true
    primary_language = "en"
    supported_languages = ["en"]
    supported_devices = ["none"]
